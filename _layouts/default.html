<!DOCTYPE html>
<html lang="zh">
<head>
  {% include head.html %}
</head>
<body>
  <div class="layout-wrapper">
    {% include sidebar.html %}
    <div class="main-area">
      <main class="content" aria-label="Content">
        {% unless page.layout == 'home' %}
        <h1 class="page-title">{{ page.title }}</h1>
        {% endunless %}
        {{ content }}
      </main>
      {% include footer.html %}
    </div>
  </div>
  <script>
  (function() {
    var sidebar = document.getElementById('sidebar');
    var btn = document.getElementById('sidebarToggle');
    if (!sidebar) return;

    function updateState() {
      var wide = window.innerWidth >= 1024;
      if (wide) {
        sidebar.classList.remove('force-collapsed');
        sidebar.classList.add('expanded');
      } else {
        sidebar.classList.remove('expanded');
      }
    }

    btn.addEventListener('click', function() {
      // Manual toggle overrides auto behavior
      if (sidebar.classList.contains('expanded')) {
        sidebar.classList.remove('expanded');
        sidebar.classList.add('force-collapsed');
      } else {
        sidebar.classList.remove('force-collapsed');
        sidebar.classList.add('expanded');
      }
    });

    window.addEventListener('resize', function() {
      // Only auto-adjust if not manually toggled
      var wide = window.innerWidth >= 1024;
      if (!sidebar.classList.contains('force-collapsed') && wide) {
        sidebar.classList.add('expanded');
      }
      if (!sidebar.classList.contains('force-collapsed') && !wide) {
        sidebar.classList.remove('expanded');
      }
      // If manually collapsed (force-collapsed) and screen goes wide, keep it collapsed
      // If manually expanded and screen goes narrow, keep it expanded but user can re-toggle
    });

    updateState();
  })();
  </script>
</body>
</html>
