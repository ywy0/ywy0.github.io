            - | # 自定义主题色（DarkSlateBlue，原始配置）
              <style>
                .theme-base-07 {
                  --theme-base-color: DarkSlateBlue;
                }
              </style>
            - | # 页面优化标签（原始配置）
              <meta
                name="viewport"
                content="width=device-width,minimum-scale=1,initial-scale=1"
              />
              <meta
                http-equiv="content-type"
                content="text/html; charset=utf-8"
              />
              <link
                rel="alternate"
                href="/feed.xml"
                title="RSS"
                type="application/rss+xml"
              />
            - | # 网站图标（原始路径）
              <link
                rel="apple-touch-icon-precomposed"
                href="https://ywy0.github.io/file/favicon.ico"
              />
              <link
                rel="shortcut icon"
                href="https://ywy0.github.io/file/favicon.ico"
              />
            - | # Lanyon基础样式（原始配置）
              <link
                rel="stylesheet"
                href="https://cdn.jsdelivr.net/combine/gh/poole/lanyon@v1.1.0/public/css/poole.min.css,gh/poole/lanyon@v1.1.0/public/css/lanyon.min.css,gh/poole/lanyon@v1.1.0/public/css/syntax.min.css"
              />
            - | # Font Awesome图标（原始配置）
              <link
                rel="stylesheet"
                href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.2.1/css/all.min.css"
              />
            - | # 侧边栏放缩修正（原始配置）
              <style>
                .wrap {
                  transition-property: width,background-size,transform;
                  transition-duration: .3s;
                  transition-timing-function: ease-in-out;
                  display: inline-block;
                }
                @media screen and (min-width: 28rem) {
                  .sidebar-overlay #sidebar-checkbox:checked ~ .wrap {
                    width: calc(100% - 14rem);
                    transform: translateX(14rem);
                  }
                  .layout-reverse.sidebar-overlay #sidebar-checkbox:checked ~ .wrap {
                    transform: translateX(0);
                  }
                }
              </style>
            - | # 中文字体解决方案（原始配置）
              <link
                rel="stylesheet"
                href="https://cdn.jsdelivr.net/npm/@fontsource/courier-prime@4.5.9/index.min.css"
              />
              <link
                rel="stylesheet"
                href="https://cdn.jsdelivr.net/npm/@fontsource/noto-serif-tc@4.5.12/500.min.css"
              />
              <link
                rel="stylesheet"
                href="https://cdn.jsdelivr.net/npm/@fontsource/noto-serif-sc@4.5.12/chinese-simplified-500.min.css"
              />
              <style>
                .sidebar, html, h1, h2, h3, h4, h5, h6, code, pre {
                  font-family: "Courier Prime", "Courier New", "Courier", "Noto Sans Mono", "Noto Serif TC", "Noto Serif SC", "Noto Serif CJK TC", "Noto Serif CJK SC", "Source Han Serif SC", "Source Han Serif CN", STZhongsong, STSong, "Songti SC", "AR PL New Sung", "AR PL SungtiL GB", NSimSun, SimSun, "TW\-Sung", "WenQuanYi Bitmap Song", "AR PL UMing CN", "AR PL UMing HK", "AR PL UMing TW", "AR PL UMing TW MBE", PMingLiU, MingLiU, monospace;
                }
              </style>
            - | # 修复行内图片样式（原始配置）
              <style>
                img {
                  display: inline-block;
                  margin: 0;
                }
              </style>
            - | # 自定义滚动条（原始配置）
              <style>
                ::-webkit-scrollbar {
                  width: 3px;
                  height: 3px;
                }
                ::-webkit-scrollbar-thumb {
                  background-color: Gray;
                }
              </style>
            - | # 防止代码块过长（原始配置）
              <style>
                @media only screen {
                  pre {
                    white-space: pre;
                    max-height: 66.6vh;
                    padding: 0 1rem;
                    overflow: hidden hidden;
                  }
                  pre:hover {
                    overflow: auto auto;
                  }
                }
              </style>
            - | # 链接样式修正（原始配置）
              <style>
                .container a,
                .related-posts li a:hover {
                  color: inherit;
                  text-decoration: none;
                  border-bottom: 1px solid var(--theme-base-color);
                }
              </style>
        page: # 页面配置（完全还原）
          title: # 自动生成H1标题
            enable: true
          prepend:
            - | # 标题/引用前加图标（原始配置）
              <style>
                h1::before,
                h2::before,
                h3::before,
                h4::before,
                h5::before,
                h6::before,
                blockquote::before {
                  font-family: "Font Awesome 6 Free";
                  font-weight: bold;
                  font-size: smaller;
                  margin-right: .5rem;
                  content: "\f292";
                }
                blockquote::before { content: "\f10d"; }
              </style>
            - | # 选中文字颜色（原始配置）
              <style>
                ::selection {
                  color: White;
                  background: Black;
                }
              </style>
            - | # 标题样式调整（原始配置）
              <style>
                h1, h2, h3, h4, h5, h6 {
                  margin: 2rem 0rem 1rem 0rem;
                }
              </style>
            - | # 表格样式美化（原始配置）
              <style>
                td,
                th {
                  padding: 0px;
                  border: 0px;
                }
                table {
                  border: 0px;
                }
                table tbody {
                  display: block;
                  overflow: scroll;
                }
                table thead,
                tbody tr {
                  display: table;
                  table-layout: fixed;
                  width: 100%;
                }
              </style>
            - | # 列表项行距（原始配置）
              <style>
                .content li {
                  margin: .25rem;
                }
              </style>
            - | # 首行缩进（原始配置）
              <style>
                p {
                  text-indent: 2rem;
                }
                p img {
                  max-width: calc(100% - 4rem);
                }
              </style>