# ============================================================
#  Site Settings
# ============================================================
title: ye
description: |-
  高中学习ing<br/>
  贤者时间ing<br/>
  男大ing<br/>
  贤者ing<br/>
  <a href="3082532836@qq.com"><i class="fa-solid fa-envelope"></i></a>
  <a href="https://github.com/ywy0"><i class="fa-brands fa-github"></i></a>
  <a href="https://space.bilibili.com/2130696495"><i class="fa-brands fa-bilibili"></i></a>
  <br/>
url: https://ywy0.github.io
baseurl: ""

# ============================================================
#  Build & Output
# ============================================================
permalink: pretty
# timezone: Asia/Shanghai
future: true
# limit_posts: 999

compress_html:
  clippings: all
  endings: all
  blanklines: false
  profile: false
  comments: []          # preserve HTML comments (needed by reveal.js slides)
  startings: []
  ignore:
    envs: development    # compress in production (GitHub Pages), keep readable locally

# ============================================================
#  Markdown
# ============================================================
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter_opts:
    block:
      disable: false
      line_numbers: false
    span:
      disable: false

# ============================================================
#  Plugins
# ============================================================
plugins:
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-remote-theme

# ============================================================
#  Theme
# ============================================================
remote_theme: https://github.com/wu-kan/jekyll-theme-WuK@4.2.0

readme_index:
  with_frontmatter: true

webmaster_verifications:
  google: YIKi1rBnyUaS-DMYiluseI5kZzTwjCkTFmKkSkMZDJk
  baidu: szbTSfUGAB

# ============================================================
#  Default Front Matter & Theme Customisation
# ============================================================
defaults:
  - scope:
      path: ""
    values:
      jekyll-theme-WuK:

        # ----------------------------------------------------------
        #  Global Defaults
        # ----------------------------------------------------------
        default:
          body:
            theme-base: theme-base-07
            layout-reverse: true
            sidebar-overlay: true
          html_lang: zh

          # -- Sidebar --
          sidebar:
            disable: false
            avatar:
              enable: true
              img: https://ywy0.github.io/file/avatar.jpg
            nav:
              - title: '<i class="fa-solid fa-home fa-fw"></i> 首页'
                href: /
              - title: '<i class="fa-solid fa-comment fa-fw"></i> 留言'
                href: /comments/
              - title: '<i class="fa-solid fa-archive fa-fw"></i> 归档'
                href: /archive/
              - title: '<i class="fa-solid fa-tags fa-fw"></i> 标签'
                href: /tags/
              - title: '<i class="fa-solid fa-coffee fa-fw"></i> 打赏'
                href: /merger/

          # -- Search (full-text enabled for offline use) --
          simple_jekyll_search:
            enable: true
            full_text_search: true
            append: |
              <style>
                #sidebar-search-input {
                  background: none; border: none; color: #fff; width: 100%;
                }
                #sidebar-search-results-container {
                  overflow: hidden; max-height: 66.6vh;
                }
                #sidebar-search-results-container:hover {
                  overflow: auto;
                }
              </style>
              <input id="sidebar-search-input" placeholder="搜索博文" />
              <ol id="sidebar-search-results-container"></ol>
              <script
                src="https://cdn.jsdelivr.net/npm/simple-jekyll-search@1.9.1"
                async
                onload="
                  SimpleJekyllSearch({
                    json: '/assets/simple-jekyll-search/search.json',
                    searchInput: document.getElementById('sidebar-search-input'),
                    resultsContainer: document.getElementById('sidebar-search-results-container'),
                    searchResultTemplate: '<li><a href=\"{url}\">{title}</a></li>',
                    limit: 99,
                    fuzzy: true
                  })"></script>

          # -- Table of Contents --
          jekyll-toc:
            enable: true
            prepend: |
              <style>
                #toc { overflow: hidden; max-height: 66.6vh; }
                #toc:hover { overflow: auto; }
              </style>

          # -- Sidebar bottom --
          append_to_sidebar:
            - | # 不蒜子统计
              <div>
                <div><i class="fa-solid fa-eye fa-fw"></i><span id="busuanzi_value_page_pv"><i class="fa-solid fa-spinner fa-pulse"></i></span>次</div>
                <div><i class="fa-solid fa-paw fa-fw"></i><span id="busuanzi_value_site_pv"><i class="fa-solid fa-spinner fa-pulse"></i></span>枚</div>
                <div><i class="fa-solid fa-user-friends fa-fw"></i><span id="busuanzi_value_site_uv"><i class="fa-solid fa-spinner fa-pulse"></i></span>人</div>
                <script src="https://cdn.jsdelivr.net/npm/busuanzi@2.3/bsz.pure.mini.js" async></script>
              </div>
            - | # Copyright
              <div><i class="fa-solid fa-copyright fa-fw"></i> 2017-2023 ywy0</div>

          # -- Word count (disabled) --
          wordcount:
            enable: false
            kilo: 千
            unit: 字

        # ----------------------------------------------------------
        #  <head> Injections
        # ----------------------------------------------------------
        append_to_head:
          - | # CDN: Lanyon theme
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/combine/gh/poole/lanyon@v1.1.0/public/css/poole.min.css,gh/poole/lanyon@v1.1.0/public/css/lanyon.min.css,gh/poole/lanyon@v1.1.0/public/css/syntax.min.css" />
          - | # CDN: Font Awesome 6
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.2.1/css/all.min.css" />
          - | # CDN: Web fonts
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/courier-prime@4.5.9/index.min.css" />
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-serif-tc@4.5.12/500.min.css" />
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-serif-sc@4.5.12/chinese-simplified-500.min.css" />
          - | # Custom styles (overrides theme CDN)
            <link rel="stylesheet" href="/assets/css/blog.css" />
          - | # Meta tags
            <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1" />
            <meta http-equiv="content-type" content="text/html; charset=utf-8" />
          - | # RSS feed
            <link rel="alternate" href="/feed.xml" title="RSS" type="application/rss+xml" />
          - | # Favicon
            <link rel="apple-touch-icon-precomposed" href="https://ywy0.github.io/file/favicon.ico" />
            <link rel="shortcut icon" href="https://ywy0.github.io/file/favicon.ico" />
          - | # jsdelivr CDN auto-fallback
            <script>
            (n=>{"use strict";let r,s,e;const l=["cdn.jsdelivr.net","fastly.jsdelivr.net","gcore.jsdelivr.net","cdn.zenless.top","testingcf.jsdelivr.net","test1.jsdelivr.net"],t="//",a=l[0],i=Date.now(),o=2e3,c="jsdelivr-auto-fallback",f="/gh/PipecraftNet/jsdelivr-auto-fallback@main/empty.css?",d=e=>e&&e.includes(t+a),m=e=>e.replace(t+a,t+r),u=window.setTimeout,v=n.querySelectorAll.bind(n),g=()=>{let e,t;for(e of v('link[rel="stylesheet"]'))t=e.href,d(t)&&!t.includes(f)&&(e.href=m(t));for(e of v("script"))if(t=e.src,d(t)){const r=n.createElement("script");r.src=m(t),e.defer=!0,e.src="",e.before(r),e.remove()}for(e of v("img"))t=e.src,d(t)&&(e.src="",e.src=m(t));for(e of v("*[style]"))t=e.getAttribute("style"),d(t)&&e.setAttribute("style",m(t));for(e of v("style"))t=e.innerHTML,d(t)&&(e.innerHTML=m(t))},y=()=>{!e&&s&&r&&(console.warn(a+" is not available. Use "+r),e=!0,u(g,0),u(g,20),setInterval(g,500))},b=(()=>{try{return Object.assign({},JSON.parse(localStorage.getItem(c)||"{}"))}catch{return{}}})();var h=()=>{b.time=i,b.failed=!1,b.fastNode=null;for(const t of l)((e,t)=>{let r;const s=n.createElement("link"),l=e=>{r&&(clearTimeout(r),r=0,e||(s.href="data:text/plain;base64,"),s.remove(),t(e))};r=u(l,o),s.addEventListener("error",()=>l(!1)),s.addEventListener("load",()=>l(!0)),s.rel="stylesheet",s.text="text/css",s.href=e+f+i,n.head.insertAdjacentElement("afterbegin",s)})("https://"+t,e=>{e||t!==a||(s=!0,b.failed=!0),e&&!r&&(r=t),e&&!b.fastNode&&(b.fastNode=t),y()});u(()=>{s&&!r&&(r=l[1],y()),localStorage.setItem(c,JSON.stringify(b))},o+100)};b.time&&i-b.time<36e5&&b.failed&&b.fastNode?(s=!0,r=b.fastNode,y(),u(h,1e3)):h()})(document);
            </script>
          - | # Image lazy loading
            <script>
            document.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('img').forEach(img=>{if(!img.hasAttribute('loading'))img.setAttribute('loading','lazy')})});
            </script>
          - | # Service Worker registration
            <script>
            if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js');
            </script>

        # ----------------------------------------------------------
        #  Page-Level Defaults
        # ----------------------------------------------------------
        page:
          title:
            enable: true
          prepend: []
          plugin:
            - smart_include:
                enable: true
                key: $
              append: |
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.3/dist/katex.min.css" />
                <script src="https://cdn.jsdelivr.net/combine/npm/katex@0.16.3/dist/katex.min.js,npm/katex@0.16.3/dist/contrib/auto-render.min.js" async
                  onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}]})"></script>
            - smart_include:
                enable: true
                key: language-vega-lite
              append: |
                <script src="https://cdn.jsdelivr.net/combine/npm/vega@5.22.1,npm/vega-lite@5.6.0,npm/vega-embed@6.21.0" async
                  onload="for(let x of document.getElementsByClassName('language-vega-lite'))if(x.nodeName=='CODE'){let m=document.createElement('div');x.parentNode.insertAdjacentElement('beforebegin',m);vegaEmbed(m,JSON.parse(x.textContent))}"></script>
            - smart_include:
                enable: true
                key: language-mermaid
              append: |
                <script src="https://cdn.jsdelivr.net/npm/mermaid@9.3.0/dist/mermaid.min.js" async
                  onload="for(let x of document.getElementsByClassName('language-mermaid'))if(x.nodeName=='CODE'){let m=document.createElement('div');m.classList.add('mermaid');m.textContent=x.textContent;x.parentNode.insertAdjacentElement('beforebegin',m)}"></script>
            - smart_include:
                enable: false

        # ----------------------------------------------------------
        #  Post-Level Defaults
        # ----------------------------------------------------------
        post:
          date:
            enable: true
            prepend: '<i class="fa-solid fa-calendar-day fa-fw"></i>'
          wordcount:
            enable: true
            prepend: '<i class="fa-solid fa-file-word fa-fw"></i>'
            unit: 字
          readtime:
            enable: true
            prepend: '<i class="fa-solid fa-clock fa-fw"></i>'
            unit: 分
            divided_by: 256
          copyright: |
            <br/>
            <i class="fab fa-creative-commons-by fa-fw"></i>
            <a href="https://creativecommons.org/licenses/by/4.0/deed.zh" rel="license">CC BY 4.0</a>
            （除特别声明或转载文章外）
            <br/>
            <i class="fa-solid fa-coffee fa-fw"></i>
            <a href="/merger/">如果这篇博客帮助到你，可以请我喝一杯咖啡~</a>

        # ----------------------------------------------------------
        #  Home (Slide Deck with Reveal.js)
        # ----------------------------------------------------------
        home:
          append_to_section_tag:
            - key: data-markdown
            - key: data-separator
              value: <!-- .slide -->
            - key: data-separator-vertical
              value: <!-- .slide vertical=true -->
            - key: data-background-color
              value: "White"
          prepend: |
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/combine/npm/reveal.js@4.4.0/dist/reveal.min.css,npm/reveal.js@4.4.0/dist/theme/serif.min.css" />
            <style>
              .sidebar { line-height: 1.5; }
              .reveal .slides { text-align: left; }
              .reveal a, .reveal a:hover, .reveal a:focus { color: inherit; border-bottom: 1px solid var(--theme-base-color); }
            </style>
          append: |
            <script async src="https://cdn.jsdelivr.net/combine/npm/reveal.js@4.4.0/dist/reveal.min.js,npm/reveal.js@4.4.0/plugin/markdown/markdown.min.js,npm/reveal.js@4.4.0/plugin/math/math.min.js"
              onload="
                for(let x of document.getElementsByClassName('wrap')) x.classList.add('reveal');
                Reveal.initialize({
                  height: '100%',
                  mouseWheel: true,
                  navigationMode: 'linear',
                  plugins: [ RevealMarkdown, RevealMath.KaTeX ]
                });"></script>
