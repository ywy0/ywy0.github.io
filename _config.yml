# ============================================================
#  Site
# ============================================================
title: 忆屋
description: ye's personal site
url: https://ywy0.github.io
baseurl: ""

# ============================================================
#  Build
# ============================================================
permalink: pretty
future: true

compress_html:
  clippings: all
  endings: all
  blanklines: false
  comments: []
  startings: []
  ignore:
    envs: development

# ============================================================
#  Markdown
# ============================================================
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter_opts:
    block:
      disable: false
      line_numbers: false
    span:
      disable: false

# ============================================================
#  Plugins
# ============================================================
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# ============================================================
#  Default Layouts
# ============================================================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: pages
    values:
      layout: page


webmaster_verifications:
