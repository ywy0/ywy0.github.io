title: ye # 站点标题
description: | # 头像背后的信息（html格式），<br/>代表换行
  男大ing<br/>
  贤者ing<br/>
  <a href="mailto:3082532836@qq.com">
    <i class="fa-solid fa-envelope"></i>
  </a>
  <a href="https://github.com/ywy0">
    <i class="fa-brands fa-github"></i>
  </a>
  <a href="https://space.bilibili.com/2130696495">
    <i class="fa-brands fa-bilibili"></i>
  </a>
  <br/>
url: https://ywy0.github.io # 你的域名
baseurl: "" # 目录配置（保持为空）

defaults: # Jekyll Front Matter 默认配置
  # 1. 所有页面通用配置（确保侧边栏默认启用）
  - scope:
      path: "" # 应用于所有文件
    values:
      jekyll-theme-WuK: # WuK主题命名空间
        default:
          body:
            theme-base: theme-base-07 # 主题色（DarkSlateBlue）
            layout-reverse: true # 侧边栏在右侧
            sidebar-overlay: true # 正文不随侧边栏移动
          html_lang: zh # 页面语言
          sidebar: # 侧边栏核心配置（强制启用）
            disable: false # 关键：设为false，确保所有页面默认显示侧边栏
            avatar:
              enable: true
              img: https://ywy0.github.io/file/avatar.jpg # 头像地址
            nav: # 导航菜单
              - title: '<i class="fa-solid fa-home fa-fw"></i> 首页'
                href: /
              - title: '<i class="fa-solid fa-comment fa-fw"></i> 留言'
                href: /comments/
              - title: '<i class="fa-solid fa-archive fa-fw"></i> 归档'
                href: /archive/
              - title: '<i class="fa-solid fa-tags fa-fw"></i> 标签'
                href: /tags/
            simple_jekyll_search: # 侧边栏搜索
              enable: true
              full_text_search: false
              append: |
                <style>
                  #sidebar-search-input {
                    background: none;
                    border: none;
                    color: White;
                    width: 100%;
                  }
                  #sidebar-search-results-container {
                    overflow: hidden hidden;
                    max-height: 66.6vh;
                  }
                  #sidebar-search-results-container:hover {
                    overflow: auto auto;
                  }
                </style>
                <input id="sidebar-search-input" placeholder="搜索博文" />
                <ol id="sidebar-search-results-container"></ol>
                <script
                  src='https://cdn.jsdelivr.net/npm/simple-jekyll-search@1.9.1'
                  async='async'
                  onload='
                    SimpleJekyllSearch({
                      json: "/assets/simple-jekyll-search/search.json",
                      searchInput: document.getElementById("sidebar-search-input"),
                      resultsContainer: document.getElementById("sidebar-search-results-container"),
                      searchResultTemplate: `<li><a href="{url}">{title}</a></li>`,
                      limit: 99,
                      fuzzy: true
                    })'
                ></script>
            jekyll-toc: # 侧边栏目录
              enable: true
              prepend: |
                <style>
                  #toc {
                    overflow: hidden hidden;
                    max-height: 66.6vh;
                  }
                  #toc:hover{
                    overflow: auto auto;
                  }
                </style>
            append_to_sidebar: # 侧边栏附加内容
              - | # 侧边栏主题色
                <style>
                  #sidebar-checkbox:checked ~ .sidebar-toggle,
                  .sidebar,
                  .sidebar-toggle:active {
                    background-color: var(--theme-base-color);
                  }
                </style>
              - | # 修复侧边栏按钮定位
                <style>
                  .sidebar-checkbox { display: none; }
                  .sidebar-toggle {
                    position: fixed !important; /* 强制固定按钮，避免消失 */
                    right: 1.5rem;
                    top: 1.5rem;
                    z-index: 100; /* 确保按钮在最上层 */
                  }
                </style>
              - | # 修复侧边栏滚动和高度
                <style>
                  .sidebar {
                    position: fixed !important; /* 强制固定侧边栏 */
                    right: 0;
                    top: 0;
                    height: 100vh !important;
                    width: 14rem !important; /* 原始宽度 */
                    overflow-y: auto;
                    z-index: 99; /* 确保侧边栏在正文上层 */
                  }
                </style>
              - | # 侧边栏头像效果
                <style>
                  .effect {
                    margin: 1rem;
                    perspective: 900px;
                  }
                  .effect-img {
                    z-index: 11;
                    width: 100%;
                    transition: all 0.5s ease-in-out;
                  }
                  .effect-right_to_left:hover .effect-img {
                    transform: rotate3d(0, 1, 0, -180deg);
                  }
                </style>
              - | # 不蒜子统计
                <div>
                  <div><i class="fa-solid fa-eye fa-fw"></i><span id="busuanzi_value_page_pv"><i class="fa-solid fa-spinner fa-pulse"></i></span>次</div>
                  <div><i class="fa-solid fa-paw fa-fw"></i><span id="busuanzi_value_site_pv"><i class="fa-solid fa-spinner fa-pulse"></i></span>枚</div>
                  <div><i class="fa-solid fa-user-friends fa-fw"></i><span id="busuanzi_value_site_uv"><i class="fa-solid fa-spinner fa-pulse"></i></span>人</div>
                  <script src='https://cdn.jsdelivr.net/npm/busuanzi@2.3/bsz.pure.mini.js' async='async'></script>
                </div>
              - | # 版权声明
                <div><i class="fa-solid fa-copyright fa-fw"></i> 2017-2023 ywy0</div>
            wordcount:
              enable: false
          append_to_head: # 头部附加内容
            - | # jsdelivr防挂脚本
              <script>
                (n=>{"use strict";let r,s,e;const l=["cdn.jsdelivr.net","fastly.jsdelivr.net","gcore.jsdelivr.net","cdn.zenless.top","testingcf.jsdelivr.net","test1.jsdelivr.net"],t="//",a=l[0],i=Date.now(),o=2e3,c="jsdelivr-auto-fallback",f="/gh/PipecraftNet/jsdelivr-auto-fallback@main/empty.css?",d=e=>e&&e.includes(t+a),m=e=>e.replace(t+a,t+r),u=window.setTimeout,v=n.querySelectorAll.bind(n),g=()=>{let e,t;for(e of v('link[rel="stylesheet"]'))t=e.href,d(t)&&!t.includes(f)&&(e.href=m(t));for(e of v("script"))if(t=e.src,d(t)){const r=n.createElement("script");r.src=m(t),e.defer=!0,e.src="",e.before(r),e.remove()}for(e of v("img"))t=e.src,d(t)&&(e.src="",e.src=m(t));for(e of v("*[style]"))t=e.getAttribute("style"),d(t)&&e.setAttribute("style",m(t));for(e of v("style"))t=e.innerHTML,d(t)&&(e.innerHTML=m(t))},y=()=>{!e&&s&&r&&(console.warn(a+" is not available. Use "+r),e=!0,u(g,0),u(g,20),setInterval(g,500))},b=(()=>{try{return Object.assign({},JSON.parse(localStorage.getItem(c)||"{}"))}catch{return{}}})();var h=()=>{b.time=i,b.failed=!1,b.fastNode=null;for(const t of l)((e,t)=>{let r;const s=n.createElement("link"),l=e=>{r&&(clearTimeout(r),r=0,e||(s.href="data:text/plain;base64,"),s.remove(),t(e))};r=u(l,o),s.addEventListener("error",()=>l(!1)),s.addEventListener("load",()=>l(!0)),s.rel="stylesheet",s.text="text/css",s.href=e+f+i,n.head.insertAdjacentElement("afterbegin",s)})("https://"+t,e=>{e||t!==a||(s=!0,b.failed=!0),e&&!r&&(r=t),e&&!b.fastNode&&(b.fastNode=t),y()});u(()=>{s&&!r&&(r=l[1],y()),localStorage.setItem(c,JSON.stringify(b))},o+100)};b.time&&i-b.time<36e5&&b.failed&&b.fastNode?(s=!0,r=b.fastNode,y(),u(h,1e3)):h()})(document);
              </script>
            - | # 主题色定义
              <style>.theme-base-07 { --theme-base-color: DarkSlateBlue; }</style>
            - | # 基础元标签
              <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1" />
              <meta http-equiv="content-type" content="text/html; charset=utf-8" />
              <link rel="alternate" href="/feed.xml" title="RSS" type="application/rss+xml" />
            - | # 网站图标
              <link rel="apple-touch-icon-precomposed" href="https://ywy0.github.io/file/favicon.ico" />
              <link rel="shortcut icon" href="https://ywy0.github.io/file/favicon.ico" />
            - | # Lanyon基础样式
              <link rel="stylesheet" href="https://cdn.jsdelivr.net/combine/gh/poole/lanyon@v1.1.0/public/css/poole.min.css,gh/poole/lanyon@v1.1.0/public/css/lanyon.min.css,gh/poole/lanyon@v1.1.0/public/css/syntax.min.css" />
            - | # Font Awesome图标
              <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.2.1/css/all.min.css" />
            - | # 正文容器适配（给侧边栏留空间）
              <style>
                /* 关键：正文容器向右偏移，避免被侧边栏遮挡 */
                @media screen and (min-width: 28rem) {
                  .layout-reverse.sidebar-overlay #sidebar-checkbox:checked ~ .wrap,
                  .layout-reverse.sidebar-overlay .wrap { /* 无论侧边栏是否展开，都留空间 */
                    width: calc(100% - 14rem) !important;
                    margin-right: 14rem !important; /* 右侧留出侧边栏宽度 */
                  }
                }
                /* 修复移动端侧边栏展开 */
                @media screen and (max-width: 28rem) {
                  .sidebar { width: 12rem !important; }
                  .layout-reverse.sidebar-overlay #sidebar-checkbox:checked ~ .wrap {
                    transform: translateX(-12rem) !important;
                  }
                }
              </style>
            - | # 中文字体
              <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/courier-prime@4.5.9/index.min.css" />
              <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-serif-tc@4.5.12/500.min.css" />
              <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-serif-sc@4.5.12/chinese-simplified-500.min.css" />
              <style>
                .sidebar, html, h1, h2, h3, h4, h5, h6, code, pre {
                  font-family: "Courier Prime", "Courier New", "Courier", "Noto Sans Mono", "Noto Serif TC", "Noto Serif SC", monospace;
                }
              </style>

  # 2. Tags页专属配置（强制启用侧边栏，修复消失问题）
  - scope:
      path: "tags" # 仅应用于tags页面（包括tags.md和tags目录下文件）
    values:
      jekyll-theme-WuK:
        sidebar:
          disable: false # 强制Tags页显示侧边栏
        # Tags页标签云样式（避免错乱）
        page:
          prepend:
            - | # Tags页专属样式
              <style>
                /* 标签云布局 */
                .tag-cloud {
                  display: flex;
                  flex-wrap: wrap;
                  gap: 1rem;
                  margin: 2rem 0;
                }
                .tag-cloud a {
                  padding: 0.5rem 1rem;
                  background: rgba(101, 99, 186, 0.1); /* 主题色浅背景 */
                  color: DarkSlateBlue;
                  border-radius: 4px;
                  border-bottom: 1px solid DarkSlateBlue;
                }
                /* 标签下文章列表 */
                .tag-posts {
                  margin: 2rem 0;
                  padding-left: 1rem;
                }
                .tag-posts li {
                  margin: 0.8rem 0;
                  list-style: disc;
                }
                .tag-posts time {
                  color: #666;
                  font-size: 0.9rem;
                  margin-left: 1rem;
                }
              </style>

  # 3. 文章页配置
  - scope:
      path: "_posts"
    values:
      jekyll-theme-WuK:
        post:
          date: { enable: true, prepend: '<i class="fa-solid fa-calendar-day fa-fw"></i>' }
          wordcount: { enable: true, prepend: '<i class="fa-solid fa-file-word fa-fw"></i>', unit: '字' }
          readtime: { enable: true, prepend: '<i class="fa-solid fa-clock fa-fw"></i>', unit: '分', divided_by: 256 }
          copyright: |
            <br/><i class="fab fa-creative-commons-by fa-fw"></i>
            <a href="https://creativecommons.org/licenses/by/4.0/deed.zh" rel="license">CC BY 4.0</a>
            （除特别声明或转载文章外）

  # 4. 评论页配置
  - scope:
      path: "comments"
    values:
      jekyll-theme-WuK:
        comments:
          enable: true
          append: |
            <script
              repo="ywy0/utterances"
              src="https://utteranc.es/client.js"
              issue-term="url"
              theme="github-light"
              crossorigin="anonymous"
              async="async"
            ></script>

# 构建核心配置
compress_html:
  clippings: all
  comments: []
  ignore: { envs: all }
  blanklines: false
  profile: false

plugins:
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-remote-theme

remote_theme: https://github.com/wu-kan/jekyll-theme-WuK@4.2.0 # 固定主题版本
readme_index: { with_frontmatter: true }
webmaster_verifications:
  google: YIKi1rBnyUaS-DMYiluseI5kZzTwjCkTFmKkSkMZDJk
  baidu: szbTSfUGAB
permalink: pretty
future: true
markdown: kramdown
kramdown: { input: GFM }