title: ye # 站点标题
description: | # 头像背后的信息（html格式），<br/>代表换行
  男大ing<br/>
  贤者ing<br/>
  <a href="mailto:3082532836@qq.com">
    <i class="fa-solid fa-envelope"></i>
  </a>
  <a href="https://github.com/ywy0">
    <i class="fa-brands fa-github"></i>
  </a>
  <a href="https://space.bilibili.com/2130696495">
    <i class="fa-brands fa-bilibili"></i>
  </a>
  <br/>
url: https://ywy0.github.io # 你的域名
baseurl: "" # 目录配置（保持为空）

defaults: # Jekyll Front Matter 默认配置
  - scope:
      path: "" # 应用于所有文件
    values:
      jekyll-theme-WuK: # WuK主题命名空间（原始结构）
        default:
          body:
            theme-base: theme-base-07 # 主题色（DarkSlateBlue，原始配置）
            layout-reverse: true # 侧边栏在右侧
            sidebar-overlay: true # 正文不随侧边栏移动
          html_lang: zh # 页面语言
          sidebar: # 侧边栏配置（完全还原）
            disable: false # 显示侧边栏
            avatar: # 头像配置
              enable: true
              img: https://ywy0.github.io/file/avatar.jpg # 头像地址（原始路径）
            nav: # 导航菜单（删除打赏项）
              - title: '<i class="fa-solid fa-home fa-fw"></i> 首页'
                href: /
              - title: '<i class="fa-solid fa-comment fa-fw"></i> 留言'
                href: /comments/
              - title: '<i class="fa-solid fa-archive fa-fw"></i> 归档'
                href: /archive/
              - title: '<i class="fa-solid fa-tags fa-fw"></i> 标签'
                href: /tags/
            simple_jekyll_search: # 侧边栏搜索（原始配置）
              enable: true
              full_text_search: false # 关闭全文搜索（避免卡顿）
              append: |
                <style>
                  #sidebar-search-input {
                    background: none;
                    border: none;
                    color: White;
                    width: 100%;
                  }
                  #sidebar-search-results-container {
                    overflow: hidden hidden;
                    max-height: 66.6vh;
                  }
                  #sidebar-search-results-container:hover {
                    overflow: auto auto;
                  }
                </style>
                <input
                  id="sidebar-search-input"
                  placeholder="搜索博文"
                />
                <ol
                  id="sidebar-search-results-container"
                ></ol>
                <script
                  src='https://cdn.jsdelivr.net/npm/simple-jekyll-search@1.9.1'
                  async='async'
                  onload='
                    SimpleJekyllSearch({
                      json: "/assets/simple-jekyll-search/search.json",
                      searchInput: document.getElementById("sidebar-search-input"),
                      resultsContainer: document.getElementById("sidebar-search-results-container"),
                      searchResultTemplate: `<li><a href="{url}">{title}</a></li>`,
                      limit: 99,
                      fuzzy: true
                    })'
                ></script>
            jekyll-toc: # 侧边栏目录（原始配置）
              enable: true
              prepend: |
                <style>
                  #toc {
                    overflow: hidden hidden;
                    max-height: 66.6vh;
                  }
                  #toc:hover{
                    overflow: auto auto;
                  }
                </style>
            append_to_sidebar: # 侧边栏附加内容（完全还原）
              - | # 侧边栏使用主题色
                <style>
                  #sidebar-checkbox:checked ~ .sidebar-toggle,
                  .sidebar,
                  .sidebar-toggle:active {
                    background-color: var(--theme-base-color);
                  }
                </style>
              - | # 修复侧边栏按钮回到顶部问题
                <style>
                  .sidebar-checkbox {
                    display: none;
                  }
                  .sidebar-toggle {
                    position: fixed;
                    background: none;
                  }
                </style>
              - | # 修复侧边栏抖动问题
                <style>
                  .sidebar {
                    overflow: hidden;
                    min-height: 101%;
                  }
                  .sidebar:hover{
                    overflow-y: scroll; 
                  }
                </style>
              - | # 侧边栏头像效果
                <style>
                  .effect {
                    margin: 1rem;
                    perspective: 900px;
                  }
                  .effect-info {
                    text-align: center;
                    position: absolute;
                    top: 0;
                    width: 100%;
                    transform-style: preserve-3d;
                  }
                  .effect-img {
                    z-index: 11;
                    width: 100%;
                    height: 100%;
                    position: relative;
                    transition: all 0.5s ease-in-out;
                  }
                  .effect-img:before {
                    position: absolute;
                    display: block;
                  }
                  .effect-right_to_left .effect-img {
                    transform-origin: 0% 50%;
                  }
                  .effect-right_to_left:hover .effect-img {
                    transform: rotate3d(0, 1, 0, -180deg);
                  }
                </style>
              - | # 不蒜子统计（原始配置）
                <div>
                  <div>
                    <i class="fa-solid fa-eye fa-fw"></i>
                    <span id="busuanzi_value_page_pv">
                      <i class="fa-solid fa-spinner fa-pulse"></i>
                    </span>次
                  </div>
                  <div>
                    <i class="fa-solid fa-paw fa-fw"></i>
                    <span id="busuanzi_value_site_pv">
                      <i class="fa-solid fa-spinner fa-pulse"></i>
                    </span>枚
                  </div>
                  <div>
                    <i class="fa-solid fa-user-friends fa-fw"></i>
                    <span id="busuanzi_value_site_uv">
                      <i class="fa-solid fa-spinner fa-pulse"></i>
                    </span>人
                  </div>
                  <script
                    src='https://cdn.jsdelivr.net/npm/busuanzi@2.3/bsz.pure.mini.js'
                    async='async'
                  ></script>
                </div>
              - | # 版权声明（原始配置）
                <div>
                  <i class="fa-solid fa-copyright fa-fw"></i>
                  2017-2023 ywy0
                </div>
            wordcount: # 全站字数统计（原始配置）
              enable: false # 本地调试关闭（避免卡顿）
              prepend: <i class="fa-solid fa-user-edit fa-fw"></i>
              kilo: 千
              unit: 字
          append_to_head: # 头部附加内容（完全还原）
            - | # jsdelivr防挂脚本（原始配置）
              <script>
