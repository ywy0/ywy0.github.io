# 站点基础信息
title: ye
description: |
  男大ing<br/>
  贤者ing<br/>
  <a href="mailto:3082532836@qq.com"><i class="fa-solid fa-envelope"></i></a>
  <a href="https://github.com/ywy0"><i class="fa-brands fa-github"></i></a>
  <a href="https://space.bilibili.com/2130696495"><i class="fa-brands fa-bilibili"></i></a>
url: https://ywy0.github.io
baseurl: ""
name: "ye's theme"

# 全局路径
global_paths:
  avatar: /file/avatar.jpg
  favicon: /file/favicon.ico
  repo: ywy0/utterances

# 页面默认配置
defaults:
  - scope:
      path: ""
    values:
      jekyll-theme-WuK:
        base_setting:
          html_lang: zh
          theme_base: theme-base-0c
          layout_reverse: true
          sidebar_overlay: true
        
        sidebar:
          disable: false
          avatar:
            enable: true
            img: "{{ site.url }}{{ site.global_paths.avatar }}"
            style: |
              border-radius: 12px;
              box-shadow: 0 4px 15px rgba(0, 200, 200, 0.3);
              transition: all 0.3s ease;
              border: 2px solid rgba(0, 200, 200, 0.5);
              margin: 0 auto;
          nav:
            - title: '<i class="fa-solid fa-home fa-fw"></i> 首页'
              href: /
            - title: '<i class="fa-solid fa-comment fa-fw"></i> 留言'
              href: /comments/
            - title: '<i class="fa-solid fa-archive fa-fw"></i> 归档'
              href: /archive/
            - title: '<i class="fa-solid fa-tags fa-fw"></i> 标签'
              href: /tags/
          simple_jekyll_search:
            enable: true
            full_text_search: false
            append: |
              <style>
                #sidebar-search-input {
                  background: rgba(255,255,255,0.1);
                  border: 1px solid rgba(0,200,200,0.5);
                  color: White;
                  width: 100%;
                  padding: 6px 10px;
                  border-radius: 4px;
                  margin-bottom: 1rem;
                }
                #sidebar-search-results-container {
                  overflow: hidden;
                  max-height: 40vh;
                }
              </style>
              <input id="sidebar-search-input" placeholder="搜索博文" />
              <ol id="sidebar-search-results-container"></ol>
              <script src='https://cdn.jsdelivr.net/npm/simple-jekyll-search@1.9.1' async
                onload='SimpleJekyllSearch({
                  json: "/assets/simple-jekyll-search/search.json",
                  searchInput: document.getElementById("sidebar-search-input"),
                  resultsContainer: document.getElementById("sidebar-search-results-container"),
                  searchResultTemplate: `<li><a href="{url}">{title}</a></li>`,
                  limit: 10,
                  fuzzy: false
                })'>
              </script>
          jekyll-toc:
            enable: true
            prepend: |
              <style>
                #toc { overflow: hidden; max-height: 40vh; padding-left: 0; }
                #toc a { color: rgba(255,255,255,0.8); border-bottom: none; }
              </style>
          wordcount:
            enable: false
          append_to_sidebar:
            - |
              <style>
                :root {
                  --cyan-primary: #00c8c8;
                  --cyan-dark: #008080;
                }
                .theme-base-0c { --theme-base-color: var(--cyan-primary); }
                .sidebar {
                  background: linear-gradient(180deg, var(--cyan-dark), #006666);
                  color: white;
                  min-height: 100vh;
                  padding: 1.5rem 1rem;
                }
                .sidebar-nav-item {
                  list-style: none;
                  margin: 0.4rem 0;
                  padding: 0.3rem 0.5rem;
                  border-radius: 4px;
                }
              </style>
            - |
              <div>
                <div><i class="fa-solid fa-eye fa-fw"></i><span id="busuanzi_value_page_pv"><i class="fa-solid fa-spinner fa-pulse"></i></span>次</div>
                <div><i class="fa-solid fa-paw fa-fw"></i><span id="busuanzi_value_site_pv"><i class="fa-solid fa-spinner fa-pulse"></i></span>枚</div>
                <div><i class="fa-solid fa-user-friends fa-fw"></i><span id="busuanzi_value_site_uv"><i class="fa-solid fa-spinner fa-pulse"></i></span>人</div>
                <script src='https://cdn.jsdelivr.net/npm/busuanzi@2.3/bsz.pure.mini.js' async></script>
              </div>
              <div><i class="fa-solid fa-copyright fa-fw"></i> 2017-2023 ywy0</div>
        
        append_to_head:
          - |
            <style>
              body { margin: 0; }
              a { text-decoration: none; }
              h1,h2,h3 { color: #006666; }
              blockquote { border-left: 4px solid #00c8c8; }
            </style>
          - |
            <meta name="viewport" content="width=device-width,minimum-scale=1" />
            <link rel="shortcut icon" href="{{ site.url }}{{ site.global_paths.favicon }}" />
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/combine/gh/poole/lanyon@v1.1.0/public/css/poole.min.css,gh/poole/lanyon@v1.1.0/public/css/lanyon.min.css,npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" />

  - scope:
      path: "_posts"
    values:
      jekyll-theme-WuK:
        post:
          date: { enable: true, prepend: '<i class="fa-solid fa-calendar-day fa-fw"></i>' }
          wordcount: { enable: true, prepend: '<i class="fa-solid fa-file-word fa-fw"></i>', unit: '字' }
          readtime: { enable: true, prepend: '<i class="fa-solid fa-clock fa-fw"></i>', unit: '分', divided_by: 300 }
          copyright: |
            <br/><i class="fab fa-creative-commons-by fa-fw"></i>
            <a href="https://creativecommons.org/licenses/by/4.0/deed.zh">CC BY 4.0</a>

  - scope:
      path: "comments"
    values:
      jekyll-theme-WuK:
        comments:
          enable: true
          append: |
            <script repo="{{ site.global_paths.repo }}"
              src="https://utteranc.es/client.js"
              issue-term="url" theme="github-light"
              crossorigin="anonymous" async>
            </script>

# 插件与构建配置
compress_html:
  clippings: all
  ignore: { envs: [development] }

plugins:
  - jekyll-readme-index
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-remote-theme

remote_theme: https://github.com/wu-kan/jekyll-theme-WuK@4.2.0

webmaster_verifications:
  google: YIKi1rBnyUaS-DMYiluseI5kZzTwjCkTFmKkSkMZDJk
  baidu: szbTSfUGAB

permalink: pretty
timezone: Asia/Shanghai
future: true
markdown: kramdown
kramdown: { input: GFM }